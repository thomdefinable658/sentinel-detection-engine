id: 8a9d3f0c-1b2e-4d6a-9c11-7f4e0c2b8a0b
name: Azure - NSG Rule Opens Port to 0.0.0.0/0
description: |
  Detects creation or update of an NSG rule that allows inbound traffic from
  Internet / Any (0.0.0.0/0, *) on a sensitive port (22, 3389, 1433, 3306, 5432,
  6379, 27017, 9200). Common cause of accidental exposure and the precursor to
  brute-force / RCE chains.
severity: High
status: Available
requiredDataConnectors:
  - connectorId: AzureActivity
    dataTypes:
      - AzureActivity
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
  - DefenseEvasion
relevantTechniques:
  - T1190
  - T1562.007
query: |
  let sensitive_ports = dynamic(["22","3389","1433","3306","5432","6379","27017","9200","5984","11211"]);
  AzureActivity
  | where OperationNameValue endswith "SECURITYRULES/WRITE"
  | where ActivityStatusValue == "Success"
  | extend props = parse_json(tostring(Properties))
  | extend reqBody = parse_json(tostring(props.requestbody))
  | extend ruleProps = parse_json(tostring(reqBody.properties))
  | extend SourcePrefix = tostring(ruleProps.sourceAddressPrefix)
  | extend DestPortRange = tostring(ruleProps.destinationPortRange)
  | extend Access = tostring(ruleProps.access)
  | extend Direction = tostring(ruleProps.direction)
  | where Direction =~ "Inbound" and Access =~ "Allow"
  | where SourcePrefix in ("*","0.0.0.0/0","Internet","Any")
  | where DestPortRange in (sensitive_ports) or DestPortRange == "*"
  | project TimeGenerated, Caller, CallerIpAddress, ResourceId, ResourceGroup,
            SourcePrefix, DestPortRange, Access, Direction
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: Caller
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: CallerIpAddress
  - entityType: AzureResource
    fieldMappings:
      - identifier: ResourceId
        columnName: ResourceId
version: 1.0.0
