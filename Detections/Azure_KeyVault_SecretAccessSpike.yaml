id: 8a9d3f0c-1b2e-4d6a-9c11-7f4e0c2b8a0c
name: Azure - Key Vault Secret Access Spike Per Identity
description: |
  Detects an identity accessing > 25 distinct Key Vault secrets / keys / certs
  within 1 hour, where that identity has historically accessed < 5/hour over the
  prior 30 days. Indicator of credential harvesting after compromise of an SP /
  managed identity (Storm-0558-style).
severity: High
status: Available
requiredDataConnectors:
  - connectorId: AzureKeyVault
    dataTypes:
      - AzureDiagnostics
queryFrequency: 1h
queryPeriod: 30d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - CredentialAccess
  - Discovery
relevantTechniques:
  - T1555.005
  - T1087.004
query: |
  let lookback = 30d;
  let recent = 1h;
  let abs_threshold = 25;
  let baseline =
    AzureDiagnostics
    | where TimeGenerated between (ago(lookback) .. ago(recent))
    | where ResourceType == "VAULTS" and ResourceProvider == "MICROSOFT.KEYVAULT"
    | where OperationName has_any ("SecretGet","KeyGet","CertificateGet")
    | extend Identity = coalesce(identity_claim_appid_g, tostring(parse_json(tostring(identity_s)).claim.appid))
    | summarize HourlyDistinct = dcount(id_s) by Identity, bin(TimeGenerated, 1h)
    | summarize MeanH = avg(HourlyDistinct), StdH = stdev(HourlyDistinct) by Identity;
  AzureDiagnostics
  | where TimeGenerated > ago(recent)
  | where ResourceType == "VAULTS" and ResourceProvider == "MICROSOFT.KEYVAULT"
  | where OperationName has_any ("SecretGet","KeyGet","CertificateGet")
  | extend Identity = coalesce(identity_claim_appid_g, tostring(parse_json(tostring(identity_s)).claim.appid))
  | summarize DistinctSecrets = dcount(id_s), Vaults = make_set(Resource, 10),
              IPs = make_set(CallerIPAddress, 10), Ops = make_set(OperationName, 10)
            by Identity
  | where DistinctSecrets >= abs_threshold
  | join kind=leftouter baseline on Identity
  | extend AnomalyScore = iff(StdH > 0, (todouble(DistinctSecrets) - MeanH) / StdH, 99.0)
  | where AnomalyScore > 3.0 or isnull(MeanH)
  | project TimeGenerated = now(), Identity, DistinctSecrets, MeanH, StdH,
            AnomalyScore, Vaults, IPs, Ops
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: AadUserId
        columnName: Identity
version: 1.0.0
