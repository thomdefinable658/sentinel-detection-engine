id: 8a9d3f0c-1b2e-4d6a-9c11-7f4e0c2b8a0a
name: MDE - PowerShell EncodedCommand With Long Payload
description: |
  Detects powershell.exe / pwsh.exe invocations with -EncodedCommand (or short
  aliases -enc, -e, -ec) and a Base64 payload longer than 250 chars. Decodes
  short payloads inline. Almost always malicious in non-admin environments.
severity: High
status: Available
requiredDataConnectors:
  - connectorId: MicrosoftThreatProtection
    dataTypes:
      - DeviceProcessEvents
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Execution
  - DefenseEvasion
relevantTechniques:
  - T1059.001
  - T1027
query: |
  DeviceProcessEvents
  | where FileName in~ ("powershell.exe","pwsh.exe")
  | where ProcessCommandLine matches regex @"(?i)\s-(?:enc(?:odedcommand)?|e|ec)\s+[A-Za-z0-9+/=]{250,}"
  | extend EncodedBlob = extract(@"(?i)\s-(?:enc(?:odedcommand)?|e|ec)\s+([A-Za-z0-9+/=]+)", 1, ProcessCommandLine)
  | extend DecodedAttempt = iff(strlen(EncodedBlob) < 4000,
                                base64_decode_tostring(EncodedBlob),
                                "<too long, decode offline>")
  | project TimeGenerated, DeviceName, AccountName, FileName, ProcessCommandLine,
            EncodedBlob, DecodedAttempt, InitiatingProcessFileName,
            InitiatingProcessCommandLine
entityMappings:
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: DeviceName
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName
  - entityType: Process
    fieldMappings:
      - identifier: CommandLine
        columnName: ProcessCommandLine
version: 1.0.0
