id: 8a9d3f0c-1b2e-4d6a-9c11-7f4e0c2b8a08
name: MDE - rundll32 With External Network Connection
description: |
  Detects rundll32.exe processes making outbound network connections to non-RFC1918
  destinations. Legitimate rundll32 should rarely contact the internet directly;
  this pattern is a hallmark of CobaltStrike, IcedID, and Qakbot loaders.
severity: High
status: Available
requiredDataConnectors:
  - connectorId: MicrosoftThreatProtection
    dataTypes:
      - DeviceProcessEvents
      - DeviceNetworkEvents
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - DefenseEvasion
  - Execution
  - CommandAndControl
relevantTechniques:
  - T1218.011
  - T1071.001
query: |
  let proc =
    DeviceProcessEvents
    | where FileName =~ "rundll32.exe"
    | project ProcTime = TimeGenerated, DeviceId, DeviceName, ProcessId = ProcessId,
              InitiatingProcessFileName, ProcessCommandLine, AccountName;
  let net =
    DeviceNetworkEvents
    | where InitiatingProcessFileName =~ "rundll32.exe"
    | where RemoteIPType !in ("Private","Loopback","LinkLocal","Reserved")
    | where RemotePort in (80, 443, 8080, 8443, 53)
    | project NetTime = TimeGenerated, DeviceId, InitiatingProcessId,
              RemoteIP, RemotePort, RemoteUrl;
  proc
  | join kind=inner net on DeviceId, $left.ProcessId == $right.InitiatingProcessId
  | where NetTime between (ProcTime .. (ProcTime + 10m))
  | project ProcTime, NetTime, DeviceName, AccountName, ProcessCommandLine,
            RemoteIP, RemotePort, RemoteUrl, InitiatingProcessFileName
entityMappings:
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: DeviceName
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: RemoteIP
version: 1.0.0
