id: 9b1a4e0d-2c3f-4e7b-8d22-8f5e1d3c9b07
name: HUN - New Scheduled Task With Script Action
description: |
  Hypothesis - schtasks.exe / Register-ScheduledTask creating a task that runs
  a script interpreter, encoded payload, or LOLBin is a top persistence TTP
  across ransomware affiliates.
tactics:
  - Persistence
  - PrivilegeEscalation
relevantTechniques:
  - T1053.005
requiredDataConnectors:
  - connectorId: MicrosoftThreatProtection
    dataTypes:
      - DeviceProcessEvents
query: |
  DeviceProcessEvents
  | where TimeGenerated > ago(24h)
  | where FileName in~ ("schtasks.exe","powershell.exe","pwsh.exe")
  | where ProcessCommandLine matches regex @"(?i)(schtasks.*\/create|Register-ScheduledTask|New-ScheduledTaskAction)"
  | where ProcessCommandLine has_any ("powershell","cmd.exe","wscript","cscript","mshta","rundll32","regsvr32","-enc","FromBase64String","http://","https://")
  | project TimeGenerated, DeviceName, AccountName, FileName, ProcessCommandLine,
            InitiatingProcessFileName, InitiatingProcessCommandLine
version: 1.0.0
