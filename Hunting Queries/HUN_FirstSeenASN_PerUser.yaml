id: 9b1a4e0d-2c3f-4e7b-8d22-8f5e1d3c9b01
name: HUN - First-Seen ASN per User (30-day baseline)
description: |
  Hypothesis - Account takeover often shows up as a sign-in from an ASN the
  user has never used before. Surface every successful interactive sign-in in
  the last 24 h whose ASN does not appear in the prior 30 d for that user.
tactics:
  - InitialAccess
relevantTechniques:
  - T1078.004
requiredDataConnectors:
  - connectorId: AzureActiveDirectory
    dataTypes:
      - SigninLogs
query: |
  let lookback = 30d;
  let recent = 24h;
  let baseline =
    SigninLogs
    | where TimeGenerated between (ago(lookback) .. ago(recent))
    | where ResultType == 0
    | summarize KnownASNs = make_set(AutonomousSystemNumber, 50) by UserPrincipalName;
  SigninLogs
  | where TimeGenerated > ago(recent)
  | where ResultType == 0
  | extend ASN = AutonomousSystemNumber
  | join kind=leftouter baseline on UserPrincipalName
  | where isnotnull(ASN) and not(set_has_element(KnownASNs, ASN))
  | project TimeGenerated, UserPrincipalName, IPAddress, ASN, Location,
            AppDisplayName, UserAgent
version: 1.0.0
