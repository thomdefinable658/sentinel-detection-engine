name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validators
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml yamllint

      - name: yamllint
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: disable, trailing-spaces: enable, indentation: {spaces: 2}}}" \
            Detections "Hunting Queries"

      - name: Schema + ATT&CK ID + KQL sanity check
        run: python scripts/ci_validate.py

      - name: Regenerate coverage and fail if drift
        run: |
          python scripts/generate_coverage.py
          git diff --exit-code coverage.md attack-navigator/layer.json \
            || (echo "::error::coverage.md or attack-navigator/layer.json is stale. Run scripts/generate_coverage.py and commit." && exit 1)
